# Opt-in systemd drop-in: let Helmsman's supervised edge/L4 children bind
# privileged ports (< 1024).
#
# Helmsman supervises its edge (Caddy, ports 80/443) and — when edge.l4_enabled —
# its L4 load balancer (nginx-stream, e.g. DNS 53 / DoT 853) as CHILD processes, so
# they inherit this unit's capabilities. The hardened default unit deliberately drops
# CAP_NET_BIND_SERVICE (a control plane shouldn't bind low ports); enable this ONLY if
# Helmsman owns the public edge and/or the L4 LB on this host.
#
# Install (it layers on top of the shipped helmsman.service, replacing only these two
# directives):
#   sudo install -D -m0644 helmsman-privileged-ports.conf \
#     /etc/systemd/system/helmsman.service.d/10-privileged-ports.conf
#   sudo systemctl daemon-reload && sudo systemctl restart helmsman
#
# Security posture: the bounding set is narrowed to EXACTLY this one capability (no
# others can be gained — NoNewPrivileges stays on), and the egress firewall
# (IPAddressDeny=any in the base unit) still prevents the process and its children
# from reaching anything but the allow-listed app/ACME networks. Inbound ports
# (80/443, 53/853, …) are opened in your HOST firewall, not here.
[Service]
CapabilityBoundingSet=CAP_NET_BIND_SERVICE
AmbientCapabilities=CAP_NET_BIND_SERVICE
