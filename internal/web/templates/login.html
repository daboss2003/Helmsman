{{template "top" .}}
<main class="auth">
  <div class="card">
    <div class="brand-big">⎈ Helmsman</div>
    <p class="muted">Sign in to the ops dashboard.</p>
    {{if .Error}}<div class="error" role="alert">{{.Error}}</div>{{end}}
    <form method="post" action="/login" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Username
        <input type="text" name="username" autocomplete="username" autofocus required>
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <label>TOTP <span class="muted">(if enabled)</span>
        <input type="text" name="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]*">
      </label>
      <button type="submit">Sign in</button>
    </form>
  </div>
</main>
{{template "bottom" .}}
