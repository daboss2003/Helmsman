# Helmsman-OWNED read-only docker-socket-proxy (plan §3). This file is EMBEDDED in
# the binary and written + brought up by Helmsman itself at boot — the operator never
# runs a docker command for it. It is the security boundary for the READ plane: the
# raw /var/run/docker.sock is mounted ONLY here (read-only), and Helmsman polls
# container state through this proxy on loopback :2375. Deny-by-default: only the
# CONTAINERS / INFO / VERSION read verbs are enabled; every write verb stays 0.
# (Write-plane actions never use this proxy — they shell out to `docker compose`.)
services:
  docker-socket-proxy:
    # Digest-PINNED (plan §15): Helmsman auto-pulls and runs this at boot with the raw
    # docker socket mounted in, so its integrity is the read-plane boundary. A mutable
    # :tag would let a registry/tag swap gain socket access — pin by sha256 (this is
    # docker-socket-proxy 0.3.0).
    image: ghcr.io/tecnativa/docker-socket-proxy@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
    container_name: helmsman-socket-proxy
    restart: unless-stopped
    # NOTE: NOT read_only. This image (haproxy-based) renders /usr/local/etc/haproxy/
    # haproxy.cfg from a baked template at startup; a read-only rootfs makes that write
    # fail and `set -e` crash-loops the entrypoint (the read plane never comes up). The
    # read-plane boundary does NOT depend on read_only — it is the :ro docker.sock mount,
    # the verb allowlist below (only CONTAINERS/INFO/VERSION), cap_drop: ALL, and
    # no-new-privileges. (A tmpfs over that dir shadows the baked template; a named
    # volume would serve a STALE verb-allowlist after an image bump — both worse.)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Bind ONLY to loopback so the proxy is never reachable off-host.
    ports:
      - "127.0.0.1:2375:2375"
    volumes:
      # Read-only mount of the raw socket — into the proxy ONLY.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # --- read plane: allow ---
      CONTAINERS: "1"
      INFO: "1"
      VERSION: "1"
      # --- everything else: deny (deny-by-default) ---
      POST: "0"
      EXEC: "0"
      IMAGES: "0"
      VOLUMES: "0"
      NETWORKS: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      PLUGINS: "0"
      NODES: "0"
      DISTRIBUTION: "0"
      SESSION: "0"
      AUTH: "0"
