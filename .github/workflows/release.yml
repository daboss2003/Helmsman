name: release

# Cut a release on every semver tag: build all arches, package .deb/.rpm, sign the
# checksums, and publish a GitHub release. Tag with: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Import the GPG key used to sign checksums (and the APT repo). Store the private
      # key + passphrase as repo secrets GPG_PRIVATE_KEY and GPG_PASSPHRASE.
      - id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
